<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form id="clientForm">

        <h1>Cadastro De usuário</h1>

        <p>Por favor registre o seu nome e o seu email:</p>
        
        <label for="nameInput">Insira o seu usuario:</label>

        <input type="text" id="nameInput" required>

        <label for="emailInput">Insira o seu email:</label>

        <input type="email" id="emailInput" required>

        <button type="submit" id="dataBtn">
            Registrar
        </button>

        <ul id="dataList"></ul>
    
    </form>
    
    <script src="script.js"></script>    
</body>
</html>
