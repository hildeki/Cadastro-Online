<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <main class="container">
        <h1>Cadastro de usuário</h1>

        <p>Por favor, registre o seu nome e o seu email:</p>

        <form id="clientForm">
            <label for="nameInput">Insira o seu usuário:</label>
            <input type="text" id="nameInput" placeholder="Digite seu nome">

            <label for="emailInput">Insira o seu email:</label>
            <input type="email" id="emailInput" placeholder="Digite seu email">

            <button type="submit">Registrar</button>
        </form>

        <p id="message"></p>

        <h2>Usuários cadastrados</h2>
        <ul id="dataList"></ul>

        <p>Total de usuários: <span id="totalClients">0</span></p>
    </main>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
